mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.110.0"
  pullPolicy: IfNotPresent

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      limit_percentage: 80
      spike_limit_percentage: 25

  exporters:
    otlp/jaeger:
      endpoint: jaeger:4317
      tls:
        insecure: true
    prometheus:
      endpoint: 0.0.0.0:8889
    loki:
      endpoint: http://loki:3100/loki/api/v1/push
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/jaeger]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [loki]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8889"

ports:
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
