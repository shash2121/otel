loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

deploymentMode: SingleBinary

chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: true
gateway:
  enabled: false

persistence:
  enabled: true
  size: 10Gi
  storageClass: gp2
